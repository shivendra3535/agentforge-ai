server.port=8080

spring.application.name=api-gateway

eureka.client.service-url.defaultZone=http://localhost:8761/eureka

spring.cloud.gateway.routes[0].id=orchestrator-service
spring.cloud.gateway.routes[0].uri=lb://ORCHESTRATOR-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/orchestrator/**

spring.cloud.gateway.routes[1].id=auth-service
spring.cloud.gateway.routes[1].uri=lb://ORCHESTRATOR-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/auth/**

management.endpoints.web.exposure.include=*